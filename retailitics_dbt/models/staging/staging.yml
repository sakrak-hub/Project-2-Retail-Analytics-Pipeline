      - name: _source_system
        description: Source system identifier
        tests:
          - not_null:
              config:
                severity: error
          - accepted_values:
              values: ['RETAIL_S3']
              config:
                severity: warn

tests:
  - name: test_transaction_product_composite_key
    description: Verify (transaction_id_clean, product_id) composite key is unique
    
  - name: test_has_promotion_matches_promotion_code
    description: Verify has_promotion = TRUE when promotion_code is not NULL
    
  - name: test_is_refund_matches_refund_reason
    description: Verify is_refund = TRUE when refund_reason is not NULL
    
  - name: test_discount_amount_calculation
    description: Verify discount_amount = quantity * unit_price * (discount_percent/100)
  
  - name: test_email_uniqueness
    description: Verify email addresses are unique (allows for NULL)
    
  - name: test_age_matches_dob
    description: Verify age calculation matches date_of_birth
    
  - name: test_state_zip_consistency
    description: Verify state matches state_code_from_zip when both exist
    
  - name: test_quality_tier_matches_issues_count
    description: Verify quality_tier correctly categorizes based on quality_issues_count

  - name: test_cost_not_exceeds_price
    description: Verify cost_price does not exceed selling_price (allows for loss leaders)
    
  - name: test_profit_margin_calculation
    description: Verify profit_margin_pct correctly calculated as ((selling_price - cost_price) / selling_price) * 100
    
  - name: test_stock_flags_consistency
    description: Verify is_out_of_stock, is_low_stock, and is_available flags are mutually consistent
    
  - name: test_no_negative_stock
    description: Verify stock_quantity is never negative
    
  - name: test_weight_category_matches_weight
    description: Verify weight_category correctly categorizes based on weight value

  - name: test_store_name_uniqueness
    description: Verify store names are unique within the same city
    
  - name: test_years_matches_days_since_opening
    description: Verify years_since_opening approximately matches days_since_opening / 365
    
  - name: test_region_matches_state
    description: Verify region correctly categorizes based on state
    
  - name: test_no_future_opening_dates
    description: Verify opening_date is not in the future
    
  - name: test_store_category_matches_store_type
    description: Verify store_category correctly maps from store_type