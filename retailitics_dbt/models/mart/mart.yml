version: 2

models:
  - name: dim_customers
    description: >
      Customer dimension table with current customer information.
      Grain: One row per customer.
    
    config:
      tags: ['gold', 'dimension']
    
    columns:
      - name: customer_key
        description: Surrogate key for customer dimension (MD5 hash)
        tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: error
      
      - name: customer_id
        description: Natural key from source system
        tests:
          - unique
          - not_null:
              config:
                severity: error
      
      - name: age
        description: Customer age in years
        tests:
          - dbt_utils.accepted_range:
              min_value: 18
              max_value: 120
              config:
                severity: warn
      
      - name: age_group
        description: Age group categorization
        tests:
          - accepted_values:
              values: ['Under 18', '18-24', '25-34', '35-44', '45-54', '55-64', '65+']
              config:
                severity: warn
      
      - name: gender
        description: Customer gender
        tests:
          - accepted_values:
              values: ['Male', 'Female', 'Other', 'Prefer not to say']
              config:
                severity: warn
      
      - name: customer_tenure_category
        description: Customer tenure categorization
        tests:
          - accepted_values:
              values: ['New (< 3 months)', 'Recent (3-12 months)', 'Established (1-2 years)', 'Loyal (2+ years)']
              config:
                severity: warn
      
      - name: ltv_category
        description: Lifetime value category
        tests:
          - accepted_values:
              values: ['High Value', 'Medium Value', 'Low Value', 'Very Low Value', 'Negative']
              config:
                severity: warn
      
      - name: quality_tier
        description: Data quality tier
        tests:
          - accepted_values:
              values: ['CLEAN', 'ACCEPTABLE', 'POOR']
              config:
                severity: warn

  - name: dim_products
    description: >
      Product dimension table with current product information.
      Grain: One row per product.
    
    config:
      tags: ['gold', 'dimension']
    
    columns:
      - name: product_key
        description: Surrogate key for product dimension (MD5 hash)
        tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: error
      
      - name: product_id
        description: Natural key from source system
        tests:
          - unique
          - not_null:
              config:
                severity: error
      
      - name: selling_price
        description: Current selling price
        tests:
          - not_null:
              config:
                severity: warn
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              config:
                severity: error
      
      - name: cost_price
        description: Cost price from supplier
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              where: "cost_price IS NOT NULL"
              config:
                severity: error
          - dbt_utils.expression_is_true:
              expression: "<= selling_price"
              where: "cost_price IS NOT NULL"
              config:
                severity: warn
                error_if: ">100"
      
      - name: profit_margin_pct
        description: Profit margin percentage
        tests:
          - dbt_utils.accepted_range:
              min_value: -100
              max_value: 100
              config:
                severity: warn
      
      - name: price_category
        description: Price category classification
        tests:
          - accepted_values:
              values: ['LUXURY', 'CLEARANCE', 'STANDARD']
              config:
                severity: warn
      
      - name: weight_category
        description: Weight category
        tests:
          - accepted_values:
              values: ['Unknown', 'Light (< 1 kg)', 'Medium (1-5 kg)', 'Heavy (5-25 kg)', 'Very Heavy (25+ kg)']
              config:
                severity: warn
      
      - name: product_maturity
        description: Product lifecycle stage
        tests:
          - accepted_values:
              values: ['Unknown', 'New (< 1 month)', 'Recent (1-3 months)', 'Current (< 1 year)', 'Established (1-2 years)', 'Mature (2+ years)']
              config:
                severity: warn

  - name: dim_stores
    description: >
      Store dimension table with current store information.
      Grain: One row per store.
    
    config:
      tags: ['gold', 'dimension']
    
    columns:
      - name: store_key
        description: Surrogate key for store dimension
        tests:
          - unique
          - not_null
      
      - name: store_id
        description: Natural key from source system
        tests:
          - unique
          - not_null
      
      - name: region
        description: Geographic region
        tests:
          - accepted_values:
              values: ['Northeast', 'South', 'Midwest', 'West']

  - name: dim_date
    description: >
      Date dimension with calendar attributes.
      Supports fiscal and calendar reporting.
      Grain: One row per date.
    
    config:
      tags: ['gold', 'dimension']
    
    columns:
      - name: date_key
        description: Surrogate key (YYYYMMDD format)
        tests:
          - unique
          - not_null
      
      - name: date_actual
        description: Actual calendar date
        tests:
          - unique
          - not_null

  - name: fact_sales
    description: >
      Fact table containing all sales transactions at line item level.
      Includes revenue, profit, and data quality indicators.
      Grain: One row per transaction line item (transaction_id + product).
    
    config:
      tags: ['gold', 'fact']
    
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - transaction_id
            - product_key
          config:
            severity: error
    
    columns:
      - name: sales_key
        description: Surrogate key for fact table
        tests:
          - unique
          - not_null
      
      - name: transaction_id
        description: Transaction identifier
        tests:
          - not_null
      
      - name: is_refund
        description: Boolean flag for refund transactions
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
      
      - name: line_total
        description: Line item total revenue
        tests:
          - not_null
      
      - name: line_profit
        description: Line item profit (revenue - cost)
        tests:
          - not_null
      
      - name: transaction_type
        description: Type of transaction
        tests:
          - accepted_values:
              values: ['Refund', 'Promotional Sale', 'Promotion', 'Deep Discount', 'Discounted', 'Regular Sale']
              config:
                severity: warn
      
      - name: data_quality_status
        description: Data quality indicator
        tests:
          - accepted_values:
              values: ['CLEAN', 'CORRECTED', 'INCOMPLETE']
              config:
                severity: warn

  - name: revenue_performance
    description: |
      **Daily Revenue & Profit Analysis**
      
      Aggregates daily sales metrics including revenue, profit, and transaction volumes.
      Includes moving averages, period comparisons, and time-based flags for easy filtering.
      
      **Primary Use Cases:**
      - Revenue trend analysis and forecasting
      - Profit margin tracking over time
      - Weekend vs weekday performance comparison
      - Month-to-date and year-to-date reporting
      
      **Refresh Schedule:** Daily
      **Grain:** One row per date
      
    config:
      tags: ['mart', 'simple', 'revenue']
    
    columns:
      
      - name: date
        description: Transaction date (primary key)
        tests:
          - unique
          - not_null
      
      - name: year
        description: Year (YYYY)
        tests:
          - not_null
      
      - name: quarter
        description: Quarter number (1-4)
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 4
      
      - name: month
        description: Month number (1-12)
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 12
      
      - name: month_name
        description: Full month name (January, February, etc.)
        tests:
          - not_null
      
      - name: day_name
        description: Day of week (Monday, Tuesday, etc.)
        tests:
          - not_null
      
      - name: day_type
        description: Weekend or Weekday classification
        tests:
          - not_null
          - accepted_values:
              values: ['Weekend', 'Weekday']
      
      
      - name: revenue
        description: Total gross revenue (sum of line_total) excluding refunds
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              config:
                severity: error
      
      - name: cost
        description: Total cost of goods sold (sum of total_cost)
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      
      - name: profit
        description: Total profit (revenue - cost)
        tests:
          - not_null
      
      - name: profit_margin_pct
        description: Profit margin percentage ((profit / revenue) × 100)
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
              severity: warn
      
      
      - name: transactions
        description: Count of distinct transactions
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      - name: customers
        description: Count of unique customers who made purchases
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      - name: units_sold
        description: Total quantity of items sold
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      - name: avg_order_value
        description: Average transaction value (revenue / transactions)
        tests:
          - not_null
      
      
      - name: revenue_change_vs_yesterday
        description: Revenue change compared to previous day (in dollars)
      
      - name: revenue_change_vs_last_week
        description: Revenue change compared to same day last week (in dollars)
      
      
      - name: revenue_7day_avg
        description: 7-day rolling average revenue (smoothed trend)
        tests:
          - not_null
      
      - name: revenue_30day_avg
        description: 30-day rolling average revenue (long-term trend)
        tests:
          - not_null
      
      
      - name: revenue_mtd
        description: Month-to-date cumulative revenue
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= revenue"
              config:
                severity: error
      
      - name: revenue_ytd
        description: Year-to-date cumulative revenue
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= revenue_mtd"
              config:
                severity: error
      
      
      - name: is_today
        description: Boolean flag for current date
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
      
      - name: is_last_7_days
        description: Boolean flag for last 7 days (including today)
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
      
      - name: is_last_30_days
        description: Boolean flag for last 30 days (including today)
        tests:
          - not_null
          - accepted_values:
              values: [true, false]

  - name: store_performance
    description: |
      **Store-Level Performance Analysis**
      
      Aggregates sales metrics by store to identify top performers and underperformers.
      Includes rankings, performance tiers, and efficiency metrics.
      
      **Primary Use Cases:**
      - Store ranking and benchmarking
      - Regional performance comparison
      - Store manager performance evaluation
      - Identifying stores needing support
      
      **Refresh Schedule:** Daily
      **Grain:** One row per store (15 stores total)
      
    config:
      tags: ['mart', 'store']
    
    columns:
      
      - name: store_id
        description: Store ID (primary key)
        tests:
          - unique
          - not_null
      
      - name: store_name
        description: Store name/location identifier
        tests:
          - not_null
      
      - name: city
        description: City where store is located
        tests:
          - not_null
      
      - name: state
        description: State abbreviation (e.g., CA, NY, TX)
        tests:
          - not_null
      
      - name: region
        description: Geographic region (Northeast, South, Midwest, West)
        tests:
          - not_null
          - accepted_values:
              values: ['Northeast', 'South', 'Midwest', 'West']
      
      - name: manager
        description: Store manager name
      
      
      - name: total_revenue
        description: All-time revenue for this store
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
              config:
                severity: error
      
      - name: total_profit
        description: All-time profit for this store
        tests:
          - not_null
      
      - name: profit_margin_pct
        description: Overall profit margin percentage for store
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
              severity: warn
      
      
      - name: total_transactions
        description: Total number of transactions at this store
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      - name: total_customers
        description: Unique customers who shopped at this store
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      - name: total_units_sold
        description: Total quantity of items sold
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      
      - name: avg_daily_revenue
        description: Average revenue per day with sales
        tests:
          - not_null
      
      - name: avg_daily_transactions
        description: Average transactions per day with sales
        tests:
          - not_null
      
      - name: revenue_per_customer
        description: Average revenue per unique customer
        tests:
          - not_null
      
      - name: transactions_per_customer
        description: Average number of transactions per customer (repeat rate)
        tests:
          - not_null
      
      
      - name: revenue_rank
        description: Store ranking by total revenue (1 = highest)
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 15  
      
      - name: profit_rank
        description: Store ranking by total profit (1 = highest)
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 15
      
      - name: rank_in_region
        description: Store ranking within its region
        tests:
          - not_null
      
      
      - name: performance_tier
        description: Overall performance classification
        tests:
          - not_null
          - accepted_values:
              values: ['Top 3', 'Top 25%', 'Above Average', 'Below Average', 'Bottom 25%']
      
      - name: margin_status
        description: Profit margin health indicator
        tests:
          - not_null
          - accepted_values:
              values: ['Excellent Margin', 'Good Margin', 'Fair Margin', 'Low Margin']
      
      
      - name: first_sale_date
        description: Date of first transaction at this store
        tests:
          - not_null
      
      - name: last_sale_date
        description: Date of most recent transaction
        tests:
          - not_null
      
      - name: days_with_sales
        description: Number of days with at least one transaction
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      - name: days_since_last_sale
        description: Days elapsed since last transaction (freshness indicator)
        tests:
          - not_null

  - name: products_performance
    description: |
      **Product-Level Performance Analysis**
      
      Analyzes individual product performance with revenue rankings, ABC classification,
      and sales velocity indicators. Helps identify top sellers and slow movers.
      
      **Primary Use Cases:**
      - Product portfolio optimization
      - Inventory management (identify slow movers)
      - Pricing strategy (margin analysis)
      - Marketing prioritization (top products)
      - ABC analysis for inventory classification
      
      **Refresh Schedule:** Daily
      **Grain:** One row per product (~12,000 products)
      
    config:
      tags: ['mart', 'simple', 'products']
    
    columns:
      
      - name: product_id
        description: Product ID (primary key)
        tests:
          - unique
          - not_null
      
      - name: product_name
        description: Product name
        tests:
          - not_null
      
      - name: category
        description: Product category (Grocery, Electronics, etc.)
        tests:
          - not_null
      
      - name: subcategory
        description: Product subcategory
      
      - name: brand
        description: Product brand name
      
      
      - name: list_price
        description: Official selling price from product master
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      - name: cost_price
        description: Cost price from product master
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      - name: avg_actual_price
        description: Average price actually charged (after discounts)
        tests:
          - not_null
      
      
      - name: total_revenue
        description: All-time revenue for this product
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      - name: total_profit
        description: All-time profit for this product
        tests:
          - not_null
      
      - name: profit_margin_pct
        description: Profit margin percentage
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: -100  
              max_value: 100
              severity: warn
      
      
      - name: total_units_sold
        description: Total quantity sold
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      - name: total_transactions
        description: Number of transactions containing this product
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      - name: unique_customers
        description: Number of unique customers who bought this product
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      
      - name: avg_daily_revenue
        description: Average revenue per day with sales
        tests:
          - not_null
      
      - name: avg_daily_units
        description: Average units sold per day with sales
        tests:
          - not_null
      
      - name: revenue_per_customer
        description: Average revenue per customer for this product
        tests:
          - not_null
      
      - name: units_per_customer
        description: Average units bought per customer
        tests:
          - not_null
      
      
      - name: revenue_rank
        description: Product ranking by total revenue (1 = highest)
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      - name: profit_rank
        description: Product ranking by total profit
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      - name: units_rank
        description: Product ranking by units sold
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      - name: rank_in_category
        description: Product ranking within its category
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      
      - name: performance_tier
        description: Revenue-based performance tier
        tests:
          - not_null
          - accepted_values:
              values: ['Top 10', 'Top 20%', 'Top 50%', 'Bottom 50%']
      
      - name: abc_class
        description: |
          ABC classification based on Pareto principle:
          - A: Top products contributing to 80% of revenue
          - B: Products contributing to next 15% of revenue  
          - C: Products contributing to bottom 5% of revenue
        tests:
          - not_null
          - accepted_values:
              values: ['A - Top Products', 'B - Medium Products', 'C - Low Products']
      
      - name: profit_status
        description: Profitability classification
        tests:
          - not_null
          - accepted_values:
              values: ['High Margin Winner', 'Volume Driver', 'Profitable', 'Loss Maker']
      
      - name: sales_velocity
        description: |
          Product sales activity level based on days since last sale:
          - Hot Seller: Sold in last 7 days
          - Active: Sold in last 30 days
          - Slow Moving: Sold in last 90 days
          - Dormant: No sales in 90+ days
        tests:
          - not_null
          - accepted_values:
              values: ['Hot Seller', 'Active', 'Slow Moving', 'Dormant']
      
      
      - name: first_sale_date
        description: Date of first sale for this product
        tests:
          - not_null
      
      - name: last_sale_date
        description: Date of most recent sale
        tests:
          - not_null
      
      - name: days_with_sales
        description: Number of days with at least one sale
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      - name: days_since_last_sale
        description: Days since last sale (inventory aging indicator)
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: customer_metrics
    description: |
      **Customer Purchase Behavior Analysis**
      
      Analyzes individual customer purchase patterns, lifetime value, and engagement levels.
      Segments customers by purchase frequency, recency, and value.
      
      **Primary Use Cases:**
      - Customer segmentation for marketing campaigns
      - VIP customer identification for loyalty programs
      - Re-engagement campaigns (identify at-risk customers)
      - Customer lifetime value (LTV) analysis
      - Purchase frequency and pattern analysis
      
      **Refresh Schedule:** Daily
      **Grain:** One row per customer (~55,000 customers)
      
    config:
      tags: ['mart', 'customer']
    
    columns:
      
      - name: customer_id
        description: Customer ID (primary key)
        tests:
          - unique
          - not_null
      
      - name: full_name
        description: Customer full name
        tests:
          - not_null
      
      - name: customer_segment
        description: Customer segment from master data (High Value, Medium Value, Low Value)
      
      - name: age_group
        description: Age bracket (18-24, 25-34, 35-44, etc.)
      
      - name: city
        description: Customer city
      
      - name: state
        description: Customer state
      
      
      - name: total_purchases
        description: Total number of purchases made (transaction count)
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
              config:
                severity: error
      
      - name: days_purchased
        description: Number of unique days with purchases
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      - name: months_active
        description: Number of unique months with purchases
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      
      - name: lifetime_revenue
        description: Total revenue from this customer (all-time)
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
              config:
                severity: error
      
      - name: avg_purchase_value
        description: Average transaction value for this customer
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      
      
      - name: first_purchase_date
        description: Date of customer's first purchase
        tests:
          - not_null
      
      - name: last_purchase_date
        description: Date of customer's most recent purchase
        tests:
          - not_null
      
      - name: registration_date
        description: Customer account registration date
      
      - name: customer_lifespan_days
        description: |
          Days between first and last purchase (0 for single-purchase customers).
          Indicates customer tenure/longevity.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      
      - name: days_since_last_purchase
        description: Days since last purchase (recency indicator)
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      
      
      - name: purchases_per_month
        description: Average purchases per month (frequency indicator)
        tests:
          - not_null
      
      
      - name: buyer_type
        description: |
          Customer classification by purchase frequency:
          - One-Time Buyer: 1 purchase only
          - Occasional Buyer: 2 purchases
          - Regular Buyer: 3-5 purchases
          - Frequent Buyer: 6-10 purchases
          - VIP Buyer: 10+ purchases
        tests:
          - not_null
          - accepted_values:
              values: 
                - 'One-Time Buyer'
                - 'Occasional Buyer (2 purchases)'
                - 'Regular Buyer (3-5 purchases)'
                - 'Frequent Buyer (6-10 purchases)'
                - 'VIP Buyer (10+ purchases)'
      
      - name: activity_status
        description: |
          Customer activity status by recency:
          - Active (Last 30 days): Made purchase in last 30 days
          - Recent (Last 60 days): Made purchase in last 31-60 days
          - At Risk (60-90 days): Made purchase in last 61-90 days
          - Inactive (90+ days): No purchase in 90+ days
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Active (Last 30 days)'
                - 'Recent (Last 60 days)'
                - 'At Risk (60-90 days)'
                - 'Inactive (90+ days)'
      
      - name: value_tier
        description: |
          Customer value classification by lifetime revenue:
          - High Value: $1000+
          - Medium Value: $500-$1000
          - Low Value: $100-$500
          - Very Low Value: <$100
        tests:
          - not_null
          - accepted_values:
              values:
                - 'High Value ($1000+)'
                - 'Medium Value ($500-$1000)'
                - 'Low Value ($100-$500)'
                - 'Very Low Value (<$100)'
      
      - name: purchase_pattern
        description: |
          Customer purchase consistency pattern:
          - Single Purchase: Only 1 purchase
          - Same Day Purchases: All purchases on same day
          - Weekly Buyer: Purchases roughly weekly
          - Monthly Buyer: Purchases roughly monthly
          - Irregular Buyer: No clear pattern
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Single Purchase'
                - 'Same Day Purchases'
                - 'Weekly Buyer'
                - 'Monthly Buyer'
                - 'Irregular Buyer'

tests:
  - name: test_revenue_not_zero
    description: Verify non-refund sales have positive revenue
    
  - name: test_profit_calculation
    description: Verify profit = revenue - cost
    
  - name: test_dim_date_completeness
    description: Verify dim_date has no gaps
  
  - name: test_revenue_consistency_across_marts
    description: |
      Verify total revenue matches between revenue_performance and store_performance marts.
      Ensures aggregations are consistent across different mart models.